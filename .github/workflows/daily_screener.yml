name: Daily Swing Screener

on:
  # Runs once daily after US market close.
  # US markets close at 4:00 PM ET. We run at 9:30 PM UTC, which is:
  #   - 5:30 PM ET during Eastern Daylight Time (most of the year)
  #   - 4:30 PM ET during Eastern Standard Time (early Nov - early March)
  # Either way, this is comfortably after the 4:00 PM close.
  schedule:
    - cron: '30 21 * * 1-5'   # 21:30 UTC, Monday-Friday only

  # Lets you manually trigger a run from the GitHub Actions tab, useful for testing.
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py
